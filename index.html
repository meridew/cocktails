<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Little Cocktail Bar</title>
  <meta name="description" content="A short cocktail menu — request one with your name." />
  <style>
    :root {
      --bg: #1a1216;
      --card: #241a20;
      --gold: #d9a86c;
      --rose: #e0708a;
      --text: #f4ece6;
      --muted: #b39d92;
      --line: #3a2c33;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #2c1f27, var(--bg));
      color: var(--text);
      line-height: 1.55;
      min-height: 100vh;
    }
    .wrap { max-width: 680px; margin: 0 auto; padding: 48px 20px 80px; }
    header { text-align: center; margin-bottom: 40px; }
    h1 {
      font-size: 2.4rem; margin: 0 0 6px;
      letter-spacing: 0.5px; font-weight: 700;
    }
    .sub { color: var(--muted); font-size: 1.05rem; }
    .menu { display: grid; gap: 16px; margin-bottom: 48px; }
    .cocktail {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px 20px;
      display: flex; justify-content: space-between; align-items: baseline; gap: 16px;
    }
    .cocktail h3 { margin: 0 0 4px; font-size: 1.25rem; color: var(--gold); }
    .cocktail p { margin: 0; color: var(--muted); font-size: 0.95rem; }
    .price { color: var(--rose); font-weight: 600; white-space: nowrap; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 28px 24px;
    }
    .card h2 { margin: 0 0 6px; font-size: 1.5rem; }
    .card .hint { color: var(--muted); margin: 0 0 22px; font-size: 0.95rem; }
    label { display: block; font-size: 0.9rem; margin: 0 0 6px; color: var(--text); }
    input, select, textarea {
      width: 100%; padding: 12px 14px; margin-bottom: 18px;
      background: #1c141a; color: var(--text);
      border: 1px solid var(--line); border-radius: 10px;
      font-size: 1rem; font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--gold);
    }
    textarea { resize: vertical; min-height: 70px; }
    button {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--gold), var(--rose));
      color: #1a1216; font-weight: 700; font-size: 1.05rem;
      border: none; border-radius: 10px; cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s ease;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.6; cursor: default; transform: none; }
    .status { margin-top: 16px; text-align: center; font-size: 0.98rem; min-height: 1.2em; }
    .status.ok { color: #8fe3a3; }
    .status.err { color: #ff9b9b; }
    footer { text-align: center; color: var(--muted); font-size: 0.85rem; margin-top: 40px; }
    footer a { color: var(--gold); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>🍸 The Little Cocktail Bar</h1>
      <p class="sub">Four drinks. Pick one, leave your name, we'll make it.</p>
    </header>

    <section class="menu" id="menu" aria-label="Cocktail menu"></section>

    <section class="card">
      <h2>Request a cocktail</h2>
      <p class="hint">Tell us who you are and what you'd like — we'll get it started.</p>

      <form id="request-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <label for="name">Your name</label>
        <input type="text" id="name" name="name" placeholder="e.g. Daniel" required />

        <label for="cocktail">Cocktail</label>
        <select id="cocktail" name="cocktail" required></select>

        <label for="note">Note (optional)</label>
        <textarea id="note" name="note" placeholder="No ice, extra lime, etc."></textarea>

        <button type="submit" id="submit-btn">Send my request</button>
        <p class="status" id="status" role="status" aria-live="polite"></p>
      </form>
    </section>

    <footer>
      Built with GitHub Pages · requests delivered by email
    </footer>
  </div>

  <script>
    // Single source of truth for the menu — renders the list AND the dropdown.
    const COCKTAILS = [
      { name: "Margarita",     desc: "Tequila, lime, triple sec, salt rim.",        price: "$12" },
      { name: "Negroni",       desc: "Gin, Campari, sweet vermouth, orange peel.",  price: "$13" },
      { name: "Old Fashioned", desc: "Bourbon, bitters, sugar, orange.",            price: "$13" },
      { name: "Mojito",        desc: "White rum, mint, lime, soda.",                price: "$11" },
    ];

    const menu = document.getElementById("menu");
    const select = document.getElementById("cocktail");
    COCKTAILS.forEach(function (c) {
      const item = document.createElement("article");
      item.className = "cocktail";
      item.innerHTML =
        '<div><h3>' + c.name + '</h3><p>' + c.desc + '</p></div>' +
        '<div class="price">' + c.price + '</div>';
      menu.appendChild(item);

      const opt = document.createElement("option");
      opt.value = c.name;
      opt.textContent = c.name;
      select.appendChild(opt);
    });

    // AJAX submit so the visitor stays on the page and sees a thank-you.
    const form = document.getElementById("request-form");
    const statusEl = document.getElementById("status");
    const btn = document.getElementById("submit-btn");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      if (form.action.indexOf("YOUR_FORM_ID") !== -1) {
        statusEl.className = "status err";
        statusEl.textContent = "Form not configured yet — set your Formspree ID.";
        return;
      }
      btn.disabled = true;
      statusEl.className = "status";
      statusEl.textContent = "Sending…";
      try {
        const res = await fetch(form.action, {
          method: "POST",
          body: new FormData(form),
          headers: { Accept: "application/json" },
        });
        if (res.ok) {
          form.reset();
          statusEl.className = "status ok";
          statusEl.textContent = "Thanks! Your cocktail request is on its way. 🍹";
        } else {
          throw new Error("Bad response");
        }
      } catch (err) {
        statusEl.className = "status err";
        statusEl.textContent = "Something went wrong — please try again.";
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
