<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>COCKTAILS!!!</title>
  <meta name="description" content="Margaritas, cocktails, mocktails & food — build an order, drop your name, get served." />
  <meta name="theme-color" content="#ffe600" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bungee&family=Playfair+Display:ital,wght@0,700;0,900;1,500&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- App shell: a fixed, no-scroll frame. Views swap inside .stage; the
       order lives in a right rail (desktop) / bottom sheet (mobile). -->
  <div class="app" id="app">
    <header class="appbar">
      <span class="brand">Cocktails</span>
      <nav class="topnav" aria-label="Sections">
        <button type="button" class="nav-btn" data-go="menu" aria-current="true">Menu</button>
        <button type="button" class="nav-btn" data-go="discover">Discover</button>
        <button type="button" class="nav-btn" data-go="ask">Ask</button>
      </nav>
      <button type="button" class="appbar-bartender" id="bartender-open" aria-label="Bartender mode" title="Bartender">🍸</button>
    </header>

    <main class="stage" id="stage">
      <!-- MENU view: category chips + one category's cards at a time -->
      <section class="view view-menu" id="view-menu" data-view="menu" aria-label="Menu">
        <div class="menubar">
          <button type="button" class="chip chip-fav" id="fav-filter" aria-pressed="false" hidden>⭐ Faves</button>
          <button type="button" class="chip chip-surprise" id="surprise">🎲 Surprise</button>
        </div>
        <!-- menu sections are rendered from data in app.js -->
        <div id="menu-sections"></div>
      </section>

      <!-- ASK view: natural-language / voice cocktail finder -->
      <section class="view view-ask" id="view-ask" data-view="ask" aria-label="Ask the bar" hidden>
        <div class="askbar" id="askbar">
          <p class="hint">▶ Describe what you fancy — <em>“something smoky, not too sweet”</em>, <em>“a fruity rum drink”</em>, <em>“surprise me”</em>.</p>
          <form class="askbar-form" id="askbar-form">
            <input type="text" id="askbar-input" class="askbar-input" placeholder="What are you in the mood for?" autocomplete="off" enterkeyhint="search" />
            <button type="button" class="askbar-mic" id="askbar-mic" aria-label="Speak your request" hidden>🎙️</button>
            <button type="submit" class="askbar-go" id="askbar-go">Find</button>
          </form>
          <div class="askbar-results" id="askbar-results" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <!-- ORDER: persistent rail on desktop, slide-up sheet on mobile -->
    <aside class="order-rail" id="order-rail" aria-label="Your order">
      <section id="order-form">
        <h2>Your order</h2>
        <p class="hint">▶ Add drinks, drop your name, send.</p>
        <form id="request-form" action="https://formspree.io/f/xwvzzjab" method="POST">
          <div class="basket" id="basket" aria-live="polite"></div>
          <input type="hidden" name="order" id="order-field" />
          <label for="name">Your name</label>
          <input type="text" id="name" name="name" placeholder="DANIEL" autocomplete="name"
                 autocapitalize="words" enterkeyhint="done" required />
          <label for="note">Note (optional)</label>
          <textarea id="note" name="note" placeholder="No ice! Extra lime! Make it spicy!"></textarea>
          <p class="status" id="status" role="status" aria-live="polite"></p>
          <div class="flowbar">
            <button type="submit" class="send flowbar-primary" id="submit-btn" disabled>Add something first</button>
            <button type="button" class="flowbar-back" id="order-close" aria-label="Close order">✕</button>
          </div>
        </form>
      </section>
    </aside>
    <div class="order-backdrop" id="order-backdrop" aria-hidden="true"></div>

    <!-- Bottom tab bar (mobile); desktop uses the top nav instead -->
    <nav class="tabbar" aria-label="Main navigation">
      <button type="button" class="tab" data-go="menu" aria-current="true">🍸<span>Menu</span></button>
      <button type="button" class="tab" data-go="discover">🧪<span>Discover</span></button>
      <button type="button" class="tab" data-go="ask">💬<span>Ask</span></button>
      <button type="button" class="tab tab-order" id="order-tab" data-go="order">🧺<span>Order</span><b class="tab-badge" id="order-badge" hidden>0</b></button>
    </nav>
  </div>

  <!-- Configurator bottom-sheet (every drink opens this; filled by app.js) -->
  <div class="sheet" id="customise" role="dialog" aria-modal="true" aria-labelledby="cz-title" hidden>
    <div class="sheet-card">
      <h2 id="cz-title">Customise</h2>
      <div class="sheet-body" id="cz-body"></div>
      <p class="sheet-recipe" id="cz-recipe"></p>
      <div class="flowbar">
        <button type="button" class="send flowbar-primary" id="cz-add">Add to order</button>
        <button type="button" class="flowbar-back" id="cz-close" aria-label="Back">✕ Back</button>
      </div>
    </div>
  </div>

  <!-- Make-a-Drink discovery flow (full-screen, launched from the Discover tab) -->
  <div class="mx" id="mixology" role="dialog" aria-modal="true" aria-labelledby="mx-title" hidden>
    <div class="mx-scroll">
      <div class="mx-inner">
        <div class="mx-head"><h2 id="mx-title">Make a Drink</h2></div>
        <div class="mx-build" id="mx-build" aria-live="polite"></div>
        <div class="mx-step" id="mx-step"></div>
        <div class="mx-result" id="mx-result" hidden></div>
      </div>
    </div>
    <div class="flowbar mx-flowbar">
      <button type="button" class="flowbar-back" id="mx-back" aria-label="Back">← Back</button>
    </div>
  </div>

  <!-- "Had enough already?" confirmation gate (shown when pressing Send) -->
  <div class="confirm" id="confirm" role="dialog" aria-modal="true" aria-labelledby="confirm-title" hidden>
    <div class="confirm-card">
      <h2 id="confirm-title">Sure you haven't had enough already? 🍸</h2>
      <div class="confirm-actions">
        <button type="button" class="btn-no" id="confirm-no">No — send it 🍹</button>
        <button type="button" class="btn-yes" id="confirm-yes">Yes, I've had enough</button>
      </div>
    </div>
  </div>

  <!-- Celebratory success overlay (shown after a successful order) -->
  <div class="celebrate" id="celebrate" role="dialog" aria-modal="true" aria-labelledby="celebrate-title" hidden>
    <div class="celebrate-burst" id="celebrate-burst" aria-hidden="true"></div>
    <div class="celebrate-card">
      <h2 id="celebrate-title">Cheers! 🥂</h2>
      <div class="celebrate-msg" id="celebrate-msg">Your drinks are on the way. 🍹</div>
      <button type="button" class="send" id="order-again">Start another order 🍸</button>
    </div>
  </div>

  <!-- Bartender mode: a local order queue (orders saved on THIS device) -->
  <div class="bartender" id="bartender" role="dialog" aria-modal="true" aria-labelledby="bartender-title" hidden>
    <div class="bartender-head">
      <h2 id="bartender-title">🍸 Bartender</h2>
    </div>
    <div class="bartender-bar">
      <label class="bt-toggle"><input type="checkbox" id="bt-show-done" /> Show completed</label>
      <button type="button" id="bt-export">⬇ Export JSON</button>
      <button type="button" id="bt-clear">Clear completed</button>
    </div>
    <div class="bartender-list" id="bartender-list"></div>
    <div class="flowbar">
      <button type="button" class="flowbar-back" id="bartender-close" aria-label="Close bartender mode">← Back</button>
    </div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
