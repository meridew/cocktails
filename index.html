<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>COCKTAILS!!!</title>
  <meta name="description" content="Margaritas & mocktails — pick one, shout your name, get a drink." />
  <meta name="theme-color" content="#ffe600" />
  <!-- Fun custom-drawn high-contrast cocktail glass favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bungee&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <span class="kicker">★ OPEN BAR ★</span>
      <h1>Cocktails</h1>
      <p class="sub">PICK ONE. YELL YOUR NAME. WE POUR.</p>
    </header>

    <div class="tabs" role="tablist" aria-label="Menu sections">
      <button class="tab" role="tab" id="tab-booze" aria-controls="panel-booze" aria-selected="true">
        🍸 Boozy <small>Margaritas</small>
      </button>
      <button class="tab" role="tab" id="tab-free" aria-controls="panel-free" aria-selected="false" tabindex="-1">
        🌱 Alcohol-Free <small>Mocktails</small>
      </button>
    </div>

    <section class="panel active" id="panel-booze" role="tabpanel" aria-labelledby="tab-booze">
      <div class="menu" id="menu-booze"></div>
    </section>
    <section class="panel" id="panel-free" role="tabpanel" aria-labelledby="tab-free" hidden>
      <div class="menu" id="menu-free"></div>
    </section>

    <section class="card" id="order-form">
      <h2>Gimme<br>a drink</h2>
      <p class="hint">▶ Drop your name + pick your poison (or non-poison).</p>

      <form id="request-form" action="https://formspree.io/f/xwvzzjab" method="POST">
        <label for="name">Your name</label>
        <input type="text" id="name" name="name" placeholder="DANIEL" autocomplete="name"
               autocapitalize="words" enterkeyhint="next" required />

        <label for="cocktail">Cocktail</label>
        <select id="cocktail" name="cocktail" required></select>

        <label for="note">Note (optional)</label>
        <textarea id="note" name="note" placeholder="No ice! Extra lime! Make it spicy!"></textarea>

        <button type="submit" class="send" id="submit-btn">Send it 🍹</button>
        <p class="status" id="status" role="status" aria-live="polite"></p>
      </form>
    </section>

    <footer>★ POURED VIA GITHUB PAGES ★</footer>
  </div>

  <!-- Celebratory success overlay (shown after a successful order) -->
  <div class="celebrate" id="celebrate" role="dialog" aria-modal="true" aria-labelledby="celebrate-title" hidden>
    <div class="celebrate-burst" id="celebrate-burst" aria-hidden="true"></div>
    <div class="celebrate-card">
      <h2 id="celebrate-title">Cheers! 🥂</h2>
      <p class="celebrate-msg" id="celebrate-msg">Your drink is on the way. 🍹</p>
      <button type="button" class="send" id="order-again">Order another 🍸</button>
    </div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
