<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>COCKTAILS!!!</title>
  <meta name="description" content="Margaritas, cocktails, mocktails & food — build an order, drop your name, get served." />
  <meta name="theme-color" content="#ffe600" />
  <!-- Fun custom-drawn high-contrast cocktail glass favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="favicon.svg" />
  <!-- Apply the saved theme before first paint to avoid a flash -->
  <script>try{var t=localStorage.getItem("cocktail_theme");if(t){document.documentElement.setAttribute("data-theme",t);}}catch(e){}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bungee&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <button type="button" class="theme-btn" id="theme-btn" aria-label="Change theme">🎨</button>
      <span class="kicker">★ OPEN BAR ★</span>
      <h1>Cocktails</h1>
      <p class="sub">BUILD YOUR ORDER. DROP YOUR NAME. WE SERVE.</p>
      <button type="button" class="surprise" id="surprise">🎲 Bartender's choice</button>
    </header>

    <!-- The full menu is rendered from data in app.js -->
    <div id="menu-sections"></div>

    <section class="card" id="order-form">
      <h2>Your<br>order</h2>
      <p class="hint">▶ Add as many drinks &amp; dishes as you like, then drop your name &amp; send.</p>

      <form id="request-form" action="https://formspree.io/f/xwvzzjab" method="POST">
        <!-- Live order basket (filled by app.js) -->
        <div class="basket" id="basket" aria-live="polite"></div>
        <!-- Plain-text summary of the basket, sent to Formspree -->
        <input type="hidden" name="order" id="order-field" />

        <label for="name">Your name</label>
        <input type="text" id="name" name="name" placeholder="DANIEL" autocomplete="name"
               autocapitalize="words" enterkeyhint="done" required />

        <label for="note">Note (optional)</label>
        <textarea id="note" name="note" placeholder="No ice! Extra lime! Make it spicy!"></textarea>

        <button type="submit" class="send" id="submit-btn" disabled>Add something first</button>
        <p class="status" id="status" role="status" aria-live="polite"></p>
      </form>
    </section>

    <footer>★ POURED VIA GITHUB PAGES ★ · <button type="button" class="bartender-link" id="bartender-open">Bartender</button></footer>
  </div>

  <!-- Floating basket pill: shows the running count, jumps to the order -->
  <button type="button" class="basket-pill" id="basket-pill" hidden aria-label="View your order">
    <span class="basket-pill-icon" aria-hidden="true">🧺</span>
    <span class="basket-pill-count" id="basket-pill-count">0</span>
    <span class="basket-pill-label">View order →</span>
  </button>

  <!-- Customise bottom-sheet for boozy drinks (filled by app.js) -->
  <div class="sheet" id="customise" role="dialog" aria-modal="true" aria-labelledby="cz-title" hidden>
    <div class="sheet-card">
      <button type="button" class="sheet-close" id="cz-close" aria-label="Close">✕</button>
      <h2 id="cz-title">Customise</h2>
      <div class="sheet-body" id="cz-body"></div>
      <p class="sheet-recipe" id="cz-recipe"></p>
      <button type="button" class="send" id="cz-add">Add to order</button>
    </div>
  </div>

  <!-- "Had enough already?" confirmation gate (shown when pressing Send) -->
  <div class="confirm" id="confirm" role="dialog" aria-modal="true" aria-labelledby="confirm-title" hidden>
    <div class="confirm-card">
      <h2 id="confirm-title">Sure you haven't had enough already? 🍸</h2>
      <div class="confirm-actions">
        <button type="button" class="btn-no" id="confirm-no">No — send it 🍹</button>
        <button type="button" class="btn-yes" id="confirm-yes">Yes, I've had enough</button>
      </div>
    </div>
  </div>

  <!-- Celebratory success overlay (shown after a successful order) -->
  <div class="celebrate" id="celebrate" role="dialog" aria-modal="true" aria-labelledby="celebrate-title" hidden>
    <div class="celebrate-burst" id="celebrate-burst" aria-hidden="true"></div>
    <div class="celebrate-card">
      <h2 id="celebrate-title">Cheers! 🥂</h2>
      <div class="celebrate-msg" id="celebrate-msg">Your drinks are on the way. 🍹</div>
      <button type="button" class="send" id="order-again">Start another order 🍸</button>
    </div>
  </div>

  <!-- Bartender mode: a local order queue (orders saved on THIS device) -->
  <div class="bartender" id="bartender" role="dialog" aria-modal="true" aria-labelledby="bartender-title" hidden>
    <div class="bartender-head">
      <h2 id="bartender-title">🍸 Bartender</h2>
      <button type="button" class="bartender-close" id="bartender-close" aria-label="Close bartender mode">✕</button>
    </div>
    <div class="bartender-bar">
      <label class="bt-toggle"><input type="checkbox" id="bt-show-done" /> Show completed</label>
      <button type="button" id="bt-export">⬇ Export JSON</button>
      <button type="button" id="bt-clear">Clear completed</button>
    </div>
    <div class="bartender-list" id="bartender-list"></div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
