<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COCKTAILS!!!</title>
  <meta name="description" content="Four killer cocktails — shout your name, get a drink." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bungee&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pink:   #ff2e88;
      --yellow: #ffe600;
      --cyan:   #00e5ff;
      --lime:   #acff00;
      --orange: #ff7a00;
      --ink:    #0a0a12;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Space Grotesk", system-ui, sans-serif;
      color: var(--ink);
      background: var(--yellow);
      background-image:
        repeating-linear-gradient(45deg, rgba(0,0,0,0.04) 0 22px, transparent 22px 44px),
        radial-gradient(circle at 15% 10%, var(--cyan) 0, transparent 38%),
        radial-gradient(circle at 88% 18%, var(--pink) 0, transparent 40%),
        radial-gradient(circle at 50% 95%, var(--lime) 0, transparent 45%);
      min-height: 100vh;
      overflow-x: hidden;
    }
    .wrap { max-width: 760px; margin: 0 auto; padding: 28px 18px 90px; }

    /* HEADER */
    header { text-align: center; margin: 10px 0 44px; }
    .kicker {
      display: inline-block;
      background: var(--ink); color: var(--yellow);
      font-family: "Bungee", sans-serif;
      font-size: clamp(0.8rem, 3vw, 1.1rem);
      letter-spacing: 2px;
      padding: 8px 18px; border-radius: 999px;
      transform: rotate(-3deg);
      margin-bottom: 14px;
    }
    h1 {
      font-family: "Archivo Black", sans-serif;
      font-size: clamp(3rem, 14vw, 7rem);
      line-height: 0.86;
      margin: 0;
      text-transform: uppercase;
      color: #fff;
      letter-spacing: -2px;
      text-shadow:
        4px 4px 0 var(--pink),
        8px 8px 0 var(--cyan),
        12px 12px 0 var(--ink);
    }
    .sub {
      font-family: "Bungee", sans-serif;
      margin: 22px auto 0; max-width: 460px;
      font-size: clamp(1rem, 4vw, 1.4rem);
      color: var(--ink);
      background: #fff;
      border: 4px solid var(--ink);
      padding: 10px 16px;
      box-shadow: 7px 7px 0 var(--ink);
      transform: rotate(1.2deg);
    }

    /* MENU */
    .menu { display: grid; gap: 22px; margin-bottom: 56px; }
    .cocktail {
      background: #fff;
      border: 5px solid var(--ink);
      border-radius: 18px;
      padding: 22px 24px;
      display: flex; justify-content: space-between; align-items: center; gap: 18px;
      box-shadow: 10px 10px 0 var(--ink);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .cocktail:hover { transform: translate(-3px,-3px); box-shadow: 13px 13px 0 var(--ink); }
    .cocktail:nth-child(1) { background: var(--cyan); }
    .cocktail:nth-child(2) { background: var(--lime); }
    .cocktail:nth-child(3) { background: var(--orange); }
    .cocktail:nth-child(4) { background: var(--pink); }
    .cocktail h3 {
      font-family: "Archivo Black", sans-serif;
      text-transform: uppercase;
      margin: 0 0 6px;
      font-size: clamp(1.4rem, 6vw, 2.1rem);
      letter-spacing: -0.5px;
      line-height: 0.95;
    }
    .cocktail p {
      margin: 0; font-weight: 700;
      font-size: clamp(0.9rem, 3.4vw, 1.05rem);
    }
    .price {
      font-family: "Bungee", sans-serif;
      font-size: clamp(1.4rem, 6vw, 2rem);
      background: var(--ink); color: #fff;
      padding: 6px 14px; border-radius: 12px;
      white-space: nowrap;
      transform: rotate(-4deg);
    }

    /* FORM */
    .card {
      background: var(--ink);
      border: 5px solid var(--ink);
      border-radius: 22px;
      padding: 34px 26px;
      box-shadow: 12px 12px 0 var(--pink);
    }
    .card h2 {
      font-family: "Archivo Black", sans-serif;
      text-transform: uppercase;
      color: var(--yellow);
      margin: 0 0 6px;
      font-size: clamp(1.8rem, 8vw, 3rem);
      line-height: 0.9;
      text-shadow: 3px 3px 0 var(--pink);
    }
    .card .hint { color: var(--cyan); font-weight: 700; margin: 0 0 26px; font-size: 1.05rem; }
    label {
      display: block; font-family: "Bungee", sans-serif;
      font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase;
      margin: 0 0 8px; color: #fff;
    }
    input, select, textarea {
      width: 100%; padding: 15px 16px; margin-bottom: 22px;
      background: #fff; color: var(--ink);
      border: 4px solid #fff; border-radius: 12px;
      font-size: 1.05rem; font-family: inherit; font-weight: 700;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--yellow);
      box-shadow: 0 0 0 4px var(--yellow);
    }
    textarea { resize: vertical; min-height: 76px; }
    button {
      width: 100%; padding: 20px;
      background: var(--yellow);
      color: var(--ink);
      font-family: "Bungee", sans-serif;
      font-size: clamp(1.2rem, 5vw, 1.7rem);
      text-transform: uppercase; letter-spacing: 1px;
      border: 5px solid #fff; border-radius: 14px; cursor: pointer;
      box-shadow: 0 0 0 0 var(--cyan);
      transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.15s;
    }
    button:hover { transform: translateY(-3px); box-shadow: 0 8px 0 var(--cyan); background: #fff; }
    button:active { transform: translateY(0); box-shadow: 0 0 0 0 var(--cyan); }
    button:disabled { opacity: 0.6; cursor: default; transform: none; box-shadow: none; }
    .status { margin-top: 20px; text-align: center; font-family: "Bungee", sans-serif; font-size: 1.1rem; min-height: 1.4em; }
    .status.ok  { color: var(--lime); }
    .status.err { color: var(--pink); }

    footer {
      text-align: center; margin-top: 50px;
      font-family: "Bungee", sans-serif; font-size: 0.85rem;
      color: var(--ink); transform: rotate(-1deg);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="kicker">★ OPEN BAR ★</span>
      <h1>Cocktails</h1>
      <p class="sub">PICK ONE. YELL YOUR NAME. WE POUR.</p>
    </header>

    <section class="menu" id="menu" aria-label="Cocktail menu"></section>

    <section class="card">
      <h2>Gimme<br>a drink</h2>
      <p class="hint">▶ Drop your name + pick your poison.</p>

      <form id="request-form" action="https://formspree.io/f/xwvzzjab" method="POST">
        <label for="name">Your name</label>
        <input type="text" id="name" name="name" placeholder="DANIEL" required />

        <label for="cocktail">Cocktail</label>
        <select id="cocktail" name="cocktail" required></select>

        <label for="note">Note (optional)</label>
        <textarea id="note" name="note" placeholder="No ice! Extra lime! Make it strong!"></textarea>

        <button type="submit" id="submit-btn">Send it 🍹</button>
        <p class="status" id="status" role="status" aria-live="polite"></p>
      </form>
    </section>

    <footer>★ POURED VIA GITHUB PAGES ★</footer>
  </div>

  <script>
    // Single source of truth for the menu — renders the list AND the dropdown.
    const COCKTAILS = [
      { name: "Margarita",     desc: "Tequila, lime, triple sec, salt rim.",        price: "$12" },
      { name: "Negroni",       desc: "Gin, Campari, sweet vermouth, orange peel.",  price: "$13" },
      { name: "Old Fashioned", desc: "Bourbon, bitters, sugar, orange.",            price: "$13" },
      { name: "Mojito",        desc: "White rum, mint, lime, soda.",                price: "$11" },
    ];

    const menu = document.getElementById("menu");
    const select = document.getElementById("cocktail");
    COCKTAILS.forEach(function (c) {
      const item = document.createElement("article");
      item.className = "cocktail";
      item.innerHTML =
        '<div><h3>' + c.name + '</h3><p>' + c.desc + '</p></div>' +
        '<div class="price">' + c.price + '</div>';
      menu.appendChild(item);

      const opt = document.createElement("option");
      opt.value = c.name;
      opt.textContent = c.name;
      select.appendChild(opt);
    });

    // AJAX submit so the visitor stays on the page and sees a thank-you.
    const form = document.getElementById("request-form");
    const statusEl = document.getElementById("status");
    const btn = document.getElementById("submit-btn");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      if (form.action.indexOf("YOUR_FORM_ID") !== -1) {
        statusEl.className = "status err";
        statusEl.textContent = "Form not configured yet — set your Formspree ID.";
        return;
      }
      btn.disabled = true;
      statusEl.className = "status";
      statusEl.textContent = "SENDING…";
      try {
        const res = await fetch(form.action, {
          method: "POST",
          body: new FormData(form),
          headers: { Accept: "application/json" },
        });
        if (res.ok) {
          form.reset();
          statusEl.className = "status ok";
          statusEl.textContent = "BOOM! Your drink's on the way 🍹";
        } else {
          throw new Error("Bad response");
        }
      } catch (err) {
        statusEl.className = "status err";
        statusEl.textContent = "OOPS — try that again!";
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
