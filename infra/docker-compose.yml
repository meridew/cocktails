# Cocktails — full stack on the NAS (Synology Container Manager).
# Images are built by GitHub Actions and pushed to GHCR; the NAS pulls them.
name: cocktails

services:
  api:
    image: ${API_IMAGE:-ghcr.io/meridew/cocktails-api:latest}
    restart: unless-stopped
    environment:
      PORT: "8787"
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-https://cock.meridew.com}
      STAFF_EMAIL: ${STAFF_EMAIL:-bar@local}
      STAFF_PASSWORD: ${STAFF_PASSWORD:-cocktails}
      DB_PATH: /data/cocktails.sqlite
      # Web Push (VAPID). Empty → push disabled. Generate with `gen-vapid`.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:bar@meridew.com}
    volumes:
      - cocktails-data:/data
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks: [internal]

  web:
    image: ${WEB_IMAGE:-ghcr.io/meridew/cocktails-web:latest}
    restart: unless-stopped
    networks: [internal]

  caddy:
    image: ${CADDY_IMAGE:-cocktails-caddy:local}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    # Host port → Caddy. Point the router port-forward here (no 80/443 = no DSM fight).
    ports:
      - "${PUBLIC_PORT:-8088}:80"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    networks: [internal]

volumes:
  cocktails-data:
  caddy-data:
  caddy-config:

networks:
  internal:
