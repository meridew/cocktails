name: deploy (NAS)

# Self-hosted runner on the NAS builds + deploys the stack on every push.
# Fully self-contained: no GHCR, no registry auth, nothing inbound — the
# runner dials out to GitHub, the job runs on the NAS against the host docker.
on:
  push:
    branches: [modernise, main]
  workflow_dispatch:

concurrency:
  group: nas-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, nas]
    steps:
      - uses: actions/checkout@v4

      - name: Write infra/.env
        run: |
          cat > infra/.env <<EOF
          API_IMAGE=cocktails-api:local
          WEB_IMAGE=cocktails-web:local
          CADDY_IMAGE=cocktails-caddy:local
          ALLOWED_ORIGIN=${ALLOWED_ORIGIN}
          PUBLIC_PORT=8088
          BARTENDER_KEY=${BARTENDER_KEY}
          EOF
        env:
          BARTENDER_KEY: ${{ secrets.BARTENDER_KEY }}
          ALLOWED_ORIGIN: https://cock.meridew.com

      - name: Build + deploy
        working-directory: infra
        run: |
          docker-compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
          docker image prune -f
