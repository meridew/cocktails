name: build-and-deploy (NAS)

# Hybrid CI/CD: GitHub's free cloud runners BUILD + push images to GHCR,
# then a self-hosted runner on the NAS PULLS + redeploys. Nothing inbound.
#
# Phase 2 activation (when the NAS runner + GHCR are set up and we cut over
# from GitHub Pages): uncomment the `push` trigger below and delete deploy.yml.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]

concurrency:
  group: nas-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: apps/api/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/cocktails-api
          - name: web
            dockerfile: apps/web/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/cocktails-web
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    # The self-hosted runner installed on the NAS (label: nas).
    runs-on: [self-hosted, nas]
    steps:
      - uses: actions/checkout@v4
      - name: Pull & redeploy on the NAS
        working-directory: infra
        run: |
          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f
