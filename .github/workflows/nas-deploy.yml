name: deploy (NAS)

# Push -> GitHub cloud runner typechecks/builds (free, gates prod) -> if green,
# the self-hosted NAS runner builds + deploys. Nothing inbound; no GHCR.
on:
  push:
    branches: [modernise, main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: nas-deploy
  cancel-in-progress: false # queue deploys so each build+up completes atomically

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck + svelte-check + build
        run: |
          npm run check
          npm -w @cocktails/web run build

  deploy:
    needs: check
    runs-on: [self-hosted, nas]
    steps:
      - uses: actions/checkout@v4

      - name: Write infra/.env
        run: |
          cat > infra/.env <<EOF
          API_IMAGE=cocktails-api:local
          WEB_IMAGE=cocktails-web:local
          CADDY_IMAGE=cocktails-caddy:local
          ALLOWED_ORIGIN=${ALLOWED_ORIGIN}
          PUBLIC_PORT=8088
          STAFF_EMAIL=${STAFF_EMAIL}
          STAFF_PASSWORD=${STAFF_PASSWORD}
          TUNNEL_TOKEN=${TUNNEL_TOKEN}
          EOF
        env:
          STAFF_EMAIL: ${{ secrets.STAFF_EMAIL }}
          STAFF_PASSWORD: ${{ secrets.STAFF_PASSWORD }}
          TUNNEL_TOKEN: ${{ secrets.TUNNEL_TOKEN }}
          ALLOWED_ORIGIN: https://cock.meridew.com

      - name: Build + deploy
        working-directory: infra
        run: |
          # Bring up the Cloudflare Tunnel only once a token secret exists.
          if [ -n "${TUNNEL_TOKEN}" ]; then export COMPOSE_PROFILES=tunnel; fi
          docker-compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
          docker image prune -f --filter "label=com.docker.compose.project=cocktails"
        env:
          TUNNEL_TOKEN: ${{ secrets.TUNNEL_TOKEN }}
